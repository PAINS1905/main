<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심리테스트</title>
    <style>
        /* ============================ */
        /* [1] 폰트 및 공통 스타일        */
        /* ============================ */
        @font-face { font-family: 'KBO_Dia'; src: url('KBO_medium.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'SCDream'; src: url('SCDream5.otf'); font-weight: normal; font-style: normal; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'SCDream', sans-serif; 
            line-height: 1.6; 
            background-color: #f9f9f9; 
            display: flex;
            justify-content: center; /* 화면 중앙 배치 (PC 환경 고려) */
        }

        /* ============================ */
        /* [2] 테스트 UI 메인 컨테이너    */
        /* ============================ */
        .app-container {
            width: 100%;
            max-width: 480px; /* 모바일 화면 크기에 맞춤 */
            min-height: 100vh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* 상단 네비게이션 바 (가짜 UI) */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .top-nav .menu-icon, .top-nav .right-icons { font-size: 20px; font-weight: bold; color: #333; }
        .top-nav .logo { font-family: 'KBO_Dia', sans-serif; font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .top-nav .logo-icon { width: 20px; height: 15px; background: #4a6ee0; border-radius: 10px; }

        /* 진행도 영역 */
        .progress-section {
            padding: 20px 20px 10px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background-color: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background-color: #c4b5fd; /* 연보라색 */
            width: 0%;
            transition: width 0.3s ease;
        }

        /* 문제 영역 */
        .question-section {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 30px;
            text-align: center;
        }
        .question-text {
            font-size: 1.4rem;
            word-break: keep-all;
            color: #222;
        }

        /* 선택지 버튼 영역 */
        .answer-section {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .answer-btn {
            width: 100%;
            min-height: 80px;
            padding: 15px 20px;
            background-color: #cba6f7; /* 사진과 유사한 연보라색 */
            color: white;
            border: none;
            border-radius: 0; /* 사진처럼 각진 형태 */
            font-family: 'SCDream', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            word-break: keep-all;
            transition: background-color 0.2s, transform 0.1s;
        }
        .answer-btn:hover, .answer-btn:active {
            background-color: #b48eea;
        }

        /* 결과 화면 (임시) */
        .result-section {
            display: none;
            flex-grow: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-nav">
            <div class="menu-icon">≡</div>
            <div class="logo">
                <div class="logo-icon"></div> poomang
            </div>
            <div class="right-icons">🔍 👤</div>
        </div>

        <div id="quiz-screen" style="display: flex; flex-direction: column; flex-grow: 1;">
            <div class="progress-section">
                <div class="progress-info">
                    <span>ⓒ 망이_wmntk</span>
                    <span id="step-counter">1/12</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="question-section">
                <h2 class="question-text" id="q-text">질문 불러오는 중...</h2>
            </div>

            <div class="answer-section">
                <button class="answer-btn" id="btn-a" onclick="nextQuestion(1)">A</button>
                <button class="answer-btn" id="btn-b" onclick="nextQuestion(2)">B</button>
            </div>
        </div>

        <div id="result-screen" class="result-section">
            <h2 style="font-family: 'KBO_Dia', sans-serif; margin-bottom: 20px;">테스트 완료!</h2>
            <p>결과를 계산하고 있습니다...</p>
        </div>
    </div>

    <script>
        // 12개의 임의 문제 데이터 배열
        const qnaList = [
            { q: "친구가 갑자기 오늘 저녁에 만나자고 한다. 당신의 반응은?", a: "완전 좋아! 어디서 만날까?", b: "아... 오늘은 집에서 쉬고 싶은데..." },
            { q: "새로운 모임에 나갔을 때 나는?", a: "먼저 사람들에게 다가가 대화를 주도한다.", b: "누군가 내게 말을 걸어주기를 기다린다." },
            { q: "여행 계획을 세울 때 나의 스타일은?", a: "시간 단위로 엑셀에 꼼꼼하게 정리한다.", b: "대략적인 숙소와 큰 틀만 정하고 떠난다." },
            { q: "화가 나는 일이 생겼을 때 나는?", a: "왜 화가 났는지 논리적으로 따져본다.", b: "일단 내 감정에 공감해주길 바란다." },
            { q: "책상을 정리할 때 나는?", a: "모든 물건이 제자리에 각 맞춰 있어야 직성이 풀린다.", b: "내 나름의 규칙이 있어 찾는데 지장 없다." },
            { q: "내가 주로 업로드하는 SNS 일상 게시글 스타일은?", a: "친구들과 같이 갔던 맛집이나 셀피!", b: "좋아하는 영화나 책 혹은 집에서의 소소한 일상" },
            { q: "과제를 하거나 업무를 처리할 때?", a: "미리미리 조금씩 해둔다.", b: "마감일 직전에 엄청난 집중력을 발휘한다." },
            { q: "친구의 고민 상담을 들어줄 때 나는?", a: "해결책을 제시해주려고 노력한다.", b: "친절하게 맞장구치며 감정에 공감해준다." },
            { q: "주말에 쉴 수 있는 완벽한 하루가 주어졌다!", a: "밖으로 나가서 액티비티나 전시회를 즐긴다.", b: "푹신한 침대에서 넷플릭스를 보며 귤을 까먹는다." },
            { q: "길을 걷다 우연히 예쁜 식당을 발견했다.", a: "검색창에 후기를 찾아보고 괜찮으면 들어간다.", b: "느낌이 좋다! 일단 바로 들어가서 먹어본다." },
            { q: "팀 프로젝트에서 나의 역할은 주로?", a: "전체 일정을 관리하고 방향을 잡아주는 역할", b: "통통 튀는 아이디어를 내고 분위기를 띄우는 역할" },
            { q: "테스트를 거의 다 풀었다. 지금 내 생각은?", a: "내 결과가 어떻게 나올지 너무 궁금하다!", b: "12문제가 은근히 길었네..." }
        ];

        const totalSteps = qnaList.length;
        let currentStep = 0;

        // UI 요소 가져오기
        const stepCounter = document.getElementById("step-counter");
        const progressFill = document.getElementById("progress-fill");
        const qText = document.getElementById("q-text");
        const btnA = document.getElementById("btn-a");
        const btnB = document.getElementById("btn-b");
        const quizScreen = document.getElementById("quiz-screen");
        const resultScreen = document.getElementById("result-screen");

        // 문제 화면 렌더링 함수
        function renderQuestion() {
            if (currentStep >= totalSteps) {
                // 모든 문제를 다 풀었을 때 결과 화면으로 전환
                quizScreen.style.display = "none";
                resultScreen.style.display = "flex";
                return;
            }

            // 현재 문제 데이터 가져오기
            const currentData = qnaList[currentStep];

            // 텍스트 업데이트
            qText.innerText = currentData.q;
            btnA.innerText = currentData.a;
            btnB.innerText = currentData.b;

            // 상단 진행바 및 숫자 업데이트
            stepCounter.innerText = `${currentStep + 1}/${totalSteps}`;
            const progressPercent = ((currentStep) / totalSteps) * 100; 
            // 0문제 풀었을 때 0%, 1문제 풀면 약간 차오르는 형태
            progressFill.style.width = progressPercent + "%";
        }

        // 버튼 클릭 시 다음 문제로 넘어가는 함수
        function nextQuestion(choice) {
            // choice 매개변수 (1 또는 2)를 활용하여 추후 결과 계산 로직에 사용할 수 있습니다.
            // 예: if (choice === 1) scoreA++; else scoreB++;
            
            currentStep++;
            renderQuestion();

            // 진행바가 마지막 문제를 풀 때 100% 꽉 차도록 추가 처리
            if(currentStep === totalSteps){
                 progressFill.style.width = "100%";
            }
        }

        // 초기 화면 세팅
        renderQuestion();
    </script>
</body>
</html>
