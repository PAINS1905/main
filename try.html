<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINS 심리테스트</title>
    <style>
        /* ============================ */
        /* [1] 폰트 및 공통 스타일        */
        /* ============================ */
        @font-face { 
            font-family: 'ATOZ4'; 
            /* 가지고 계신 폰트 파일 확장자(.woff, .ttf, .otf 등)에 맞게 로드되도록 다중 지정해 두었습니다 */
            src: url('fonts/ATOZ4.woff') format('woff'), 
                 url('fonts/ATOZ4.ttf') format('truetype'),
                 url('fonts/ATOZ4.otf') format('opentype');
            font-weight: normal; 
            font-style: normal; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'ATOZ4', sans-serif; 
            line-height: 1.6; 
            background-color: #f9f9f9; 
            display: flex;
            justify-content: center;
        }

        /* ============================ */
        /* [2] 메인 컨테이너 및 카드      */
        /* ============================ */
        .container { 
            width: 100%; 
            max-width: 480px; 
            min-height: 100vh; 
            padding: 2rem 1.5rem; 
            display: flex;
            flex-direction: column;
        }

        .section-card {
            background: white; 
            border-radius: 12px; 
            padding: 2rem; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        h2, h3 { font-family: 'ATOZ4', sans-serif; color: #333; }

        /* ============================ */
        /* [3] 진행도 (Progress Bar)    */
        /* ============================ */
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 8px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background-color: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 40px;
        }
        .progress-bar-fill {
            height: 100%;
            background-color: #990000; 
            width: 0%;
            transition: width 0.3s ease;
        }

        /* ============================ */
        /* [4] 질문 및 버튼 영역          */
        /* ============================ */
        .question-section {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 40px;
        }
        .question-text {
            font-size: 1.3rem;
            word-break: keep-all;
            line-height: 1.5;
        }

        .answer-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .ci-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 70px;
            padding: 15px 20px;
            background-color: #990000; 
            color: white;
            border: none;
            border-radius: 12px; /* 약간 둥근 모서리로 수정 */
            font-family: 'ATOZ4', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            word-break: keep-all;
            transition: background-color 0.2s ease;
        }
        .ci-btn:hover {
            background-color: #6b0d0d;
        }

        /* ============================ */
        /* [5] 결과 화면                  */
        /* ============================ */
        .result-section {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-grow: 1;
        }
        .result-title {
            color: #990000;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        .result-desc {
            color: #555;
            font-size: 1rem;
            line-height: 1.7;
            word-break: keep-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="section-card">
            
            <div id="quiz-screen" style="display: flex; flex-direction: column; flex-grow: 1;">
                
                <div class="progress-info">
                    <span>Providing Academic INsights for Sports.</span>
                    <span id="step-counter">1/12</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>

                <div class="question-section">
                    <h2 class="question-text" id="q-text">질문 불러오는 중...</h2>
                </div>

                <div class="answer-section">
                    <button class="ci-btn" id="btn-a" onclick="nextQuestion('A')">A</button>
                    <button class="ci-btn" id="btn-b" onclick="nextQuestion('B')">B</button>
                </div>
            </div>

            <div id="result-screen" class="result-section">
                <h2 class="result-title" id="result-title">결과 타이틀</h2>
                <p class="result-desc" id="result-desc">결과 설명이 이곳에 표시됩니다.</p>
                
                <button class="ci-btn" style="margin-top: 30px; background-color: #333;" onclick="location.reload()">테스트 다시하기</button>
            </div>

        </div>
    </div>

    <script>
        const qnaList = [
            { q: "친구가 갑자기 오늘 저녁에 만나자고 한다. 당신의 반응은?", a: "완전 좋아! 어디서 만날까?", b: "아... 오늘은 집에서 쉬고 싶은데..." },
            { q: "새로운 모임에 나갔을 때 나는?", a: "먼저 사람들에게 다가가 대화를 주도한다.", b: "누군가 내게 말을 걸어주기를 기다린다." },
            { q: "여행 계획을 세울 때 나의 스타일은?", a: "시간 단위로 엑셀에 꼼꼼하게 정리한다.", b: "대략적인 숙소와 큰 틀만 정하고 떠난다." },
            { q: "화가 나는 일이 생겼을 때 나는?", a: "왜 화가 났는지 논리적으로 따져본다.", b: "일단 내 감정에 공감해주길 바란다." },
            { q: "책상을 정리할 때 나는?", a: "모든 물건이 제자리에 각 맞춰 있어야 직성이 풀린다.", b: "내 나름의 규칙이 있어 찾는데 지장 없다." },
            { q: "내가 주로 업로드하는 SNS 일상 게시글 스타일은?", a: "친구들과 같이 갔던 맛집이나 셀피!", b: "좋아하는 영화나 책 혹은 집에서의 소소한 일상" },
            { q: "과제를 하거나 업무를 처리할 때?", a: "미리미리 조금씩 해둔다.", b: "마감일 직전에 엄청난 집중력을 발휘한다." },
            { q: "친구의 고민 상담을 들어줄 때 나는?", a: "해결책을 제시해주려고 노력한다.", b: "친절하게 맞장구치며 감정에 공감해준다." },
            { q: "주말에 쉴 수 있는 완벽한 하루가 주어졌다!", a: "밖으로 나가서 액티비티나 전시회를 즐긴다.", b: "푹신한 침대에서 넷플릭스를 보며 귤을 까먹는다." },
            { q: "길을 걷다 우연히 예쁜 식당을 발견했다.", a: "검색창에 후기를 찾아보고 괜찮으면 들어간다.", b: "느낌이 좋다! 일단 바로 들어가서 먹어본다." },
            { q: "팀 프로젝트에서 나의 역할은 주로?", a: "전체 일정을 관리하고 방향을 잡아주는 역할", b: "통통 튀는 아이디어를 내고 분위기를 띄우는 역할" },
            { q: "테스트를 거의 다 풀었다. 지금 내 생각은?", a: "내 결과가 어떻게 나올지 너무 궁금하다!", b: "12문제가 은근히 길었네..." }
        ];

        const totalSteps = qnaList.length;
        let currentStep = 0;
        
        let scores = { A: 0, B: 0 };

        const stepCounter = document.getElementById("step-counter");
        const progressFill = document.getElementById("progress-fill");
        const qText = document.getElementById("q-text");
        const btnA = document.getElementById("btn-a");
        const btnB = document.getElementById("btn-b");
        const quizScreen = document.getElementById("quiz-screen");
        const resultScreen = document.getElementById("result-screen");
        const resultTitle = document.getElementById("result-title");
        const resultDesc = document.getElementById("result-desc");

        function renderQuestion() {
            const currentData = qnaList[currentStep];

            qText.innerText = currentData.q;
            btnA.innerText = currentData.a;
            btnB.innerText = currentData.b;

            stepCounter.innerText = `${currentStep + 1}/${totalSteps}`;
            const progressPercent = (currentStep / totalSteps) * 100; 
            progressFill.style.width = progressPercent + "%";
        }

        function nextQuestion(choice) {
            if (choice === 'A') {
                scores.A += 1;
            } else if (choice === 'B') {
                scores.B += 1;
            }
            
            currentStep++;
            
            if (currentStep >= totalSteps) {
                progressFill.style.width = "100%";
                setTimeout(showResult, 300); 
            } else {
                renderQuestion();
            }
        }

        function showResult() {
            quizScreen.style.display = "none";
            resultScreen.style.display = "flex";

            if (scores.A > scores.B) {
                resultTitle.innerText = "당신은 열정적인 행동파!";
                resultDesc.innerText = "생각보다 행동이 앞서는 타입이시군요. 계획보다는 본능과 직관에 이끌려 움직일 때 더 큰 에너지를 얻는 편입니다. 붉은색과 잘 어울리는 역동적인 성향을 가지고 계시네요!";
            } else {
                resultTitle.innerText = "당신은 차분한 사색가!";
                resultDesc.innerText = "주어진 상황을 논리적으로 분석하고 여유를 즐길 줄 아는 타입이시군요. 외부의 자극보다는 내면의 평화를 중요하게 생각하며, 안정적이고 꼼꼼한 성향을 가지고 계시네요!";
            }
        }

        renderQuestion();
    </script>
</body>
</html>
