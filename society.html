<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINS - 이벤트</title>
    <style>
        /* ============================ */
        /* [1] 기본 스타일 및 레이아웃 너비 설정 */
        /* ============================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* menu.js에서 글로벌 폰트(ATOZ 폰트)를 일괄 관리하므로 로컬 폰트 설정은 삭제되었습니다. */

        section { 
            /* 모든 html 파일과 동일한 1000px 규격 */
            max-width: 1000px !important; 
            width: 100%;
            margin: 0 auto 28px auto !important; 
        }
        
        h2 { font-size: 2.2rem; margin-bottom: 40px; text-align: center; }

        /* ============================ */
        /* [2] Society 리스트 전용 스타일 */
        /* ============================ */
        .society-list {
            display: flex;
            flex-direction: column;
            gap: 25px; /* 버튼 사이 간격 */
        }

        .society-btn {
            position: relative;
            display: block;
            width: 100%;
            height: 180px; /* 버튼 높이 */
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            background-size: cover;
            background-position: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            /* 기본 box-shadow는 menu.js에서 동적 주입 */
        }

        /* 사진을 어둡게 만드는 반투명 검은색 오버레이 */
        .society-btn::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.55); 
            z-index: 1;
            transition: background-color 0.3s ease;
        }

        /* 마우스 호버(오버) 시 약간 위로 떠오르면서 밝아지는 효과 */
        .society-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); /* 떠오를 때의 그림자 강조 */
        }
        
        .society-btn:hover::before {
            background-color: rgba(0, 0, 0, 0.4); 
        }

        /* Society 텍스트 스타일 */
        .society-btn .society-name {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: bold;
            /* font-family는 menu.js에 의해 자동으로 ATOZ5 폰트로 적용됩니다. */
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            width: 100%;
            text-align: center;
            letter-spacing: 2px;
        }

        /* ============================ */
        /* [3] 반응형 스타일              */
        /* ============================ */
        @media (max-width: 600px) { 
            h2 { font-size: 1.8rem; margin-bottom: 25px; }
            .society-btn { height: 140px; }
            .society-btn .society-name { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header></header>
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" id="overlay"></div>

    <section>
        <h2>진행 중인 이벤트</h2>
        
        <div class="society-list">
            
            <a href="https://namu.wiki/w/%EC%9D%B4%EB%AF%B8%EC%A7%80%28%EA%B0%95%EC%82%AC%29" target="_blank" class="society-btn" style="background-image: url('eventex1.png');">
                <span class="society-name">이미지1</span>
            </a>

            <a href="https://www.youtube.com" target="_blank" class="society-btn" style="background-image: url('eventex2.png');">
                <span class="society-name">이벤트1</span>
            </a>

            <a href="https://www.google.com" target="_blank" class="society-btn" style="background-image: url('eventex3.png');">
                <span class="society-name">이미지2</span>
            </a>

        </div>
    </section>

    <footer></footer>

    <script>
        document.write('<script src="menu.js?v=' + new Date().getTime() + '"><\/script>');
    </script>
    
    <script>
        if (typeof loadSidebar === 'function') {
            loadSidebar('society');
        }
    </script>
</body>
</html>
