<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINS - 합격자 발표 조회</title>
    <style>
        /* [1] 폰트 설정 */
        @font-face { font-family: 'KBO_Dia'; src: url('KBO_medium.woff') format('woff'); }
        @font-face { font-family: 'SCDream'; src: url('SCDream5.otf'); }

        /* [2] 기본 스타일 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SCDream', sans-serif; background-color: #fdfdfd; color: #333; line-height: 1.6; }
        
        /* [3] 레이아웃 및 헤더 */
        header { 
            background-color: #cf8b8b; 
            color: white; 
            padding: 1rem 2rem; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            position: relative;
            z-index: 1000;
        }

        /* 햄버거 버튼 스타일 */
        .hamburger-btn {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            cursor: pointer;
            z-index: 1100;
        }
        .hamburger-btn span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: white;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        header h1 { font-family: 'KBO_Dia', sans-serif; font-size: 1.5rem; margin: 0; }
        header h1 a { text-decoration: none; color: white; }
        
        header nav { display: none; }

        /* [수정됨] 사이드바 스타일 */
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 260px;
            height: 100vh;
            background-color: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            transition: left 0.3s ease;
            z-index: 1050;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
            overflow-y: auto; 
        }
        .sidebar.active { left: 0; }

        .sidebar a {
            padding: 15px 30px;
            text-decoration: none;
            color: #333;
            font-size: 1.1rem;
            font-weight: 500;
            border-bottom: 1px solid #f9f9f9;
            transition: background 0.2s, color 0.2s;
            display: block;
        }
        .sidebar a:hover {
            background-color: #fafafa;
            color: #ab3333;
            font-weight: bold;
        }

        /* [NEW] 드롭다운 메뉴 스타일 */
        .sidebar a.menu-toggle {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .submenu {
            display: none; 
            background-color: #f8f8f8;
            border-bottom: 1px solid #eee;
        }
        .submenu.open {
            display: block; 
        }
        .submenu a {
            padding-left: 50px; 
            font-size: 1rem;
            color: #666;
            border-bottom: none;
        }
        .submenu a:hover {
            color: #ab3333;
            background-color: #f0f0f0;
        }

        /* 오버레이 스타일 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: none;
            z-index: 1040;
        }
        .overlay.active { display: block; }

        /* [4] 기존 조회 페이지 스타일 */
        .container { max-width: 500px; margin: 5rem auto; padding: 0 1rem; text-align: center; }
        
        .search-card {
            background: white; border-radius: 12px; padding: 2.5rem 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee;
        }
        .search-card h2 { font-family: 'KBO_Dia', sans-serif; color: #ab3333; margin-bottom: 0.5rem; font-size: 1.8rem; }
        .sub-title { color: #666; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #555; }
        .input-group input {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 1rem; font-family: 'SCDream', sans-serif;
        }
        .input-group input:focus { outline: none; border-color: #ab3333; }

        .btn-submit {
            width: 100%; padding: 12px; background-color: #ab3333; color: white; border: none;
            border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { background-color: #8f2a2a; }
        
        #result-area { margin-top: 30px; display: none; padding-top: 30px; border-top: 2px dashed #eee; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .result-msg { font-size: 1.1rem; margin-bottom: 15px; }
        .status-badge { 
            display: inline-block; padding: 8px 20px; border-radius: 30px; 
            font-size: 1.5rem; font-weight: bold; color: white; margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .status-pass { background-color: #27ae60; } 
        .status-fail { background-color: #e74c3c; } 

        .interview-box {
            background-color: #f8f9fa; border-radius: 10px; padding: 20px;
            text-align: left; border-left: 5px solid #ab3333; margin-top: 20px;
            display: none; 
        }
        .interview-box h4 { margin-bottom: 10px; color: #333; font-weight: bold; }
        .interview-info li { list-style: none; margin-bottom: 5px; color: #555; }
        .interview-info strong { color: #333; margin-right: 5px; }

        .loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid #ab3333; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) { 
            .container { margin-top: 2rem; } 
            header { justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <header>
        <div class="hamburger-btn" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <h1><a href="index.html">Providing Academic INsights for Sports.</a></h1>
    </header>

    <div class="sidebar" id="sidebar">
        
    </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="container">
        <div class="search-card">
            <h2>📢 결과 발표 조회</h2>
            <p class="sub-title">지원 시 제출한 학번과 이름을 입력해주세요.</p>

            <div class="input-group">
                <label for="input-id">학번 (ID)</label>
                <input type="text" id="input-id" placeholder="예: 2026123456">
            </div>
            <div class="input-group">
                <label for="input-name">이름 (Name)</label>
                <input type="text" id="input-name" placeholder="예: 홍길동">
            </div>

            <button class="btn-submit" onclick="checkResult()" id="btn-search">결과 확인하기</button>
            <div class="loader" id="loader"></div>

            <div id="result-area">
                <p class="result-msg"><span id="user-name-display" style="font-weight:bold;"></span>님의 결과입니다.</p>
                
                <div id="status-badge" class="status-badge">결과 로딩중</div>
                
                <p id="result-desc" style="color: #666; font-size: 0.95rem; word-break: keep-all;">
                    </p>

                <div class="interview-box" id="interview-box">
                    <h4>📅 면접 전형 안내</h4>
                    <ul class="interview-info">
                        <li><strong>일자:</strong> <span id="int-date">-</span></li>
                        <li><strong>시간:</strong> <span id="int-time">-</span></li>
                        <li><strong>장소:</strong> 비대면(zoom) 진행 (링크는 메일을 통해 전달 예정)</li>
                    </ul>
                    <p style="font-size: 0.8rem; color: #888; margin-top: 10px;">* 면접 시간 5분 전까지 입장해주시기 바랍니다.</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.write('<script src="menu.js?v=' + new Date().getTime() + '"><\/script>');
    </script>

    <script>
        loadSidebar('result');

        // ============================================
        // [기존 코드] 앱스 스크립트 연동
        // ============================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxL7shd9op70ZSSuEYe3Iod6wSoRfQ_UKLs7DU1TdOAWoFr1Xr-d8ZDzBBQ_Iq1kEivPg/exec";

        async function checkResult() {
            document.getElementById('input-id').blur();
            document.getElementById('input-name').blur();
            await new Promise(r => setTimeout(r, 200));

            const id = document.getElementById('input-id').value.trim();
            const name = document.getElementById('input-name').value.trim();
            
            if (!id || !name) {
                alert("학번과 이름을 모두 입력해주세요.");
                return;
            }

            const btn = document.getElementById('btn-search');
            const loader = document.getElementById('loader');
            const resultArea = document.getElementById('result-area');
            
            btn.disabled = true;
            btn.innerText = "조회 중...";
            loader.style.display = "block";
            resultArea.style.display = "none";

            try {
                // URL 끝에 현재 시간 값을 붙여서 매번 새로운 주소로 인식하게 만듦 (캐시 방지)
                const timestamp = new Date().getTime(); 
                const targetUrl = `${SCRIPT_URL}?id=${id}&name=${name}&t=${timestamp}`;
    
                // 캐시를 절대 사용하지 않도록 강력한 옵션 추가
                const response = await fetch(targetUrl, { 
                    cache: 'no-store' 
                });
                const data = await response.json();

                if (data.result === "fail") {
                    alert("일치하는 지원 정보를 찾을 수 없습니다.\n학번과 이름을 다시 확인해주세요.");
                    return;
                }

                if (data.result === "locked") {
                    alert(`아직 결과 발표 기간이 아닙니다.\n발표 일시: ${data.releaseDate} ${data.releaseTime}`);
                    return;
                }

                document.getElementById('user-name-display').innerText = name;
                const badge = document.getElementById('status-badge');
                const desc = document.getElementById('result-desc');
                const interviewBox = document.getElementById('interview-box');

                if (data.status === "합격") {
                    badge.innerText = "합 격";
                    badge.className = "status-badge status-pass"; 
                    desc.innerText = "축하드립니다! 1차 서류 전형에 합격하셨습니다.\n아래 면접 일정을 확인해주시기 바랍니다.";
                    
                    if (data.interviewDate && data.interviewTime) {
                        document.getElementById('int-date').innerText = data.interviewDate;
                        document.getElementById('int-time').innerText = data.interviewTime;
                        interviewBox.style.display = "block"; 
                    } else {
                        interviewBox.style.display = "none";
                    }

                } else {
                    badge.innerText = "불합격";
                    badge.className = "status-badge status-fail"; 
                    desc.innerHTML = "지원해주셔서 감사합니다.<br>아쉽게도 이번 모집에는 함께하지 못하게 되었습니다.<br>추후 더 좋은 기회로 뵙기를 고대하겠습니다.";
                    interviewBox.style.display = "none"; 
                }

                resultArea.style.display = "block";

            } catch (error) {
                console.error("에러 발생:", error);
                alert("조회 중 오류가 발생했습니다.");
            } finally {
                btn.disabled = false;
                btn.innerText = "결과 확인하기";
                loader.style.display = "none";
            }
        }
    </script>

</body>
</html>
