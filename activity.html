<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" /> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAINS - 활동(프로젝트 자료)</title>
  <style>
    /* ============================ */
    /* [1] 폰트 설정                */
    /* ============================ */


    /* ============================ */
    /* [2] 본문 및 세부 콘텐츠 스타일*/
    /* ============================ */
    section {
        max-width: 800px !important;
        width: calc(100% - 48px) !important;
        margin: 0 auto 28px auto !important;
        background: #ffffff;
        border-radius: 28px;
        padding: 40px;
    }

    @media (max-width: 768px) {
        section {
            width: calc(100% - 32px) !important;
            padding: 20px !important;
        }
    }
    
    h2 { font-size: 2rem; margin-bottom: 12px; text-align: center; }
    
    .subnote { text-align: center; color: #666; font-size: 0.95rem; margin-bottom: 28px; }
    .subnote strong { color: #ab3333; }

    /* 필터 영역 */
    .filters {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      background: white;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 18px;
    }

    .filter-item label {
      display: block;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 6px;
    }

    /* 검색 input */
    .filter-item input {
      width: 100%;
      padding: 10px;
      outline: none;
    }

    /* 다중선택 필터 */
    .multi-filter {
      border: 1px solid #e6e6e6;
      border-radius: 10px;
      background: #fff;
      min-height: 44px;
      overflow: hidden;
    }

    .multi-filter summary {
      list-style: none;
      cursor: pointer;
      padding: 10px 12px;
      font-size: 0.95rem;
      color: #333;
      user-select: none;
      position: relative;
    }

    .multi-filter summary::-webkit-details-marker {
      display: none;
    }

    .multi-filter summary::after {
      content: "▾";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      font-size: 0.85rem;
    }

    .multi-filter[open] summary::after {
      content: "▴";
    }

    .multi-filter-summary-text {
      display: block;
      padding-right: 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .multi-filter-panel {
      border-top: 1px solid #eee;
      padding: 10px 12px 12px;
      max-height: 260px;
      overflow-y: auto;
      background: #fff;
    }

    .multi-filter-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: 1px solid #ddd;
      background: #fafafa;
      color: #555;
      font-size: 0.8rem;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .mini-btn:hover {
      background: #f3f3f3;
    }

    .multi-filter-options {
      display: grid;
      gap: 10px;
      align-content: start;
    }
    
    .check-option {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.92rem;
      color: #333;
      word-break: keep-all;
      line-height: 1.35;
      cursor: pointer;
    }
    
    .check-option input[type="checkbox"] {
      appearance: auto !important;
      -webkit-appearance: checkbox !important;
      -moz-appearance: checkbox !important;
    
      width: 16px !important;
      height: 16px !important;
      min-width: 16px !important;
      max-width: 16px !important;
      min-height: 16px !important;
      max-height: 16px !important;
    
      margin: 0 !important;
      padding: 0 !important;
      border: none !important;
      outline: none !important;
      box-shadow: none !important;
      background: transparent !important;
    
      display: inline-block !important;
      vertical-align: middle !important;
      flex: 0 0 16px !important;
      accent-color: #ab3333;
    }
    
    .check-option span {
      display: inline-block;
      line-height: 1.35;
      vertical-align: middle;
    }
    
    .filter-actions {
      display: flex;
      align-items: end;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: bold;
      user-select: none;
    }

    /* 필터 초기화 버튼 */
    #btn-reset {
      background: transparent !important;
      color: #4a4a4a !important;
      border: 1px solid transparent !important;
      box-shadow: none !important;
      text-decoration: underline;
      text-underline-offset: 2px;
      padding-left: 4px;
      padding-right: 4px;
      border-radius: 6px !important;
    }

    #btn-reset:hover {
      background: rgba(0, 0, 0, 0.03) !important;
      color: #2f2f2f !important;
    }

    /* 결과 영역 */
    .results-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 10px 0 12px;
      padding: 0 2px;
    }

    .results-count { color: #666; font-size: 0.95rem; font-weight: bold; }
    .results-hint { color: #888; font-size: 0.9rem; }

    .project-list { list-style: none; display: grid; grid-template-columns: 1fr; gap: 12px; }

    .project-card {
      background: white;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .project-main { min-width: 0; }

    .project-title {
      display: inline-block;
      font-size: 1.05rem;
      font-weight: 700;
      color: #2c3e50;
      text-decoration: none;
      word-break: keep-all;
    }

    .project-title:hover {
      text-decoration: underline;
      text-decoration-color: rgba(171, 51, 51, 0.6);
    }

    .project-meta { margin-top: 6px; color: #777; font-size: 0.9rem; }

    .project-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* 열기 / 다운로드 버튼 둥근 정도 완화 */
    .project-actions .btn {
      border-radius: 6px !important;
    }

    .empty {
      background: #fff;
      border: 1px dashed #ddd;
      border-radius: 12px;
      padding: 26px;
      text-align: center;
      color: #777;
    }

    /* 반응형 */
    @media (max-width: 900px) {
      .filters { grid-template-columns: 1fr 1fr; }
      .filter-actions { justify-content: stretch; }
      .filter-actions .btn { width: 100%; }
    }

    @media (max-width: 520px) {
      .project-card { flex-direction: column; align-items: stretch; }
      .project-actions { justify-content: flex-end; }
      .filters { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  
  <header></header>
  <div class="sidebar" id="sidebar"></div>
  <div class="overlay" id="overlay"></div>

  <section>
    <h2>프로젝트 아카이브</h2>
    <p class="subnote">
      그동안 PAINS에서 진행된 모든 프로젝트를 자유롭게 보실 수 있습니다.
    </p>

    <div class="filters" aria-label="프로젝트 필터">
      <div class="filter-item">
        <label for="filter-year-options">연도</label>
        <details class="multi-filter" id="filter-year">
          <summary><span class="multi-filter-summary-text">전체</span></summary>
          <div class="multi-filter-panel">
            <div class="multi-filter-actions">
              <button type="button" class="mini-btn" data-action="select-all" data-target="year">전체 선택</button>
              <button type="button" class="mini-btn" data-action="clear-all" data-target="year">전체 해제</button>
            </div>
            <div class="multi-filter-options" id="filter-year-options"></div>
          </div>
        </details>
      </div>

      <div class="filter-item">
        <label for="filter-generation-options">기수</label>
        <details class="multi-filter" id="filter-generation">
          <summary><span class="multi-filter-summary-text">전체</span></summary>
          <div class="multi-filter-panel">
            <div class="multi-filter-actions">
              <button type="button" class="mini-btn" data-action="select-all" data-target="gen">전체 선택</button>
              <button type="button" class="mini-btn" data-action="clear-all" data-target="gen">전체 해제</button>
            </div>
            <div class="multi-filter-options" id="filter-generation-options"></div>
          </div>
        </details>
      </div>

      <div class="filter-item">
        <label for="filter-period-options">학기/방학</label>
        <details class="multi-filter" id="filter-period">
          <summary><span class="multi-filter-summary-text">전체</span></summary>
          <div class="multi-filter-panel">
            <div class="multi-filter-actions">
              <button type="button" class="mini-btn" data-action="select-all" data-target="period">전체 선택</button>
              <button type="button" class="mini-btn" data-action="clear-all" data-target="period">전체 해제</button>
            </div>
            <div class="multi-filter-options" id="filter-period-options"></div>
          </div>
        </details>
      </div>

      <div class="filter-item">
        <label for="filter-sport-options">종목</label>
        <details class="multi-filter" id="filter-sport">
          <summary><span class="multi-filter-summary-text">전체</span></summary>
          <div class="multi-filter-panel">
            <div class="multi-filter-actions">
              <button type="button" class="mini-btn" data-action="select-all" data-target="sport">전체 선택</button>
              <button type="button" class="mini-btn" data-action="clear-all" data-target="sport">전체 해제</button>
            </div>
            <div class="multi-filter-options" id="filter-sport-options"></div>
          </div>
        </details>
      </div>

      <div class="filter-item">
        <label for="filter-q">검색(제목)</label>
        <input id="filter-q" type="search" placeholder="예) KBO, EPL, 회귀, 승률…" />
      </div>

      <div class="filter-actions" style="grid-column: 1 / -1;">
        <button class="btn" id="btn-reset" type="button">필터 초기화</button>
      </div>
    </div>

    <div class="results-header">
      <div class="results-count" id="results-count">로딩 중…</div>
      <div class="results-hint">* 제목 또는 뷰어로 보기: 미리보기(새 탭) / 다운로드 버튼: 파일 저장</div>
    </div>

    <ul class="project-list" id="project-list" aria-label="프로젝트 목록"></ul>

    <div class="empty" id="empty" style="display:none;">
      조건에 맞는 프로젝트가 없습니다.<br />
      필터를 줄이거나 검색어를 변경해 보세요.
    </div>
  </section>

  <footer></footer>

  <script>
    document.write('<script src="menu.js?v=' + new Date().getTime() + '"><\/script>');
  </script>
  <script>
    if (typeof loadSidebar === "function") loadSidebar('activity');
  </script>

  <script src="js/activity.js"></script>
</body>
</html>
