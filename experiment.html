<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINS - 승리요정 테스트</title>
    <style>
        /* ============================ */
        /* [1] 폰트 및 공통 스타일        */
        /* ============================ */
        @font-face { font-family: 'KBO_Dia'; src: url('KBO_medium.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'SCDream'; src: url('SCDream5.otf'); font-weight: normal; font-style: normal; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SCDream', sans-serif; line-height: 1.6; background-color: #f9f9f9; }
        h1, h2, h3 { font-family: 'KBO_Dia', sans-serif; }

        /* ============================ */
        /* [2] 메인 컨텐츠 세부 스타일    */
        /* ============================ */
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .section-card {
            background: white; border-radius: 12px; padding: 2rem; margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            transition: all 0.3s ease;
        }
        .section-card h3 { font-size: 1.5rem; margin-bottom: 1rem; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .section-card h4 { color: #333; font-size: 1.1rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        
        .content-text { color: #555; font-size: 0.95rem; margin-bottom: 15px; line-height: 1.7; }

        /* ============================ */
        /* [3] 입력 폼 스타일            */
        /* ============================ */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .input-group label {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-family: 'SCDream', sans-serif;
            text-align: center;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #990000;
            box-shadow: 0 0 0 2px rgba(153, 0, 0, 0.1);
        }

        .calc-btn {
            display: block;
            width: 100%;
            background-color: #990000;
            color: white;
            text-align: center;
            padding: 15px 0;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-family: 'SCDream', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .calc-btn:hover {
            background-color: #6b0d0d;
        }

        /* ============================ */
        /* [4] 결과 출력 영역 스타일      */
        /* ============================ */
        #result-card {
            display: none; 
            background: #fffafa;
            border: 2px solid #990000;
            padding-bottom: 30px; /* 상세내용이 빠진 만큼 하단 여백 추가 */
        }
        
        .result-highlight {
            font-size: 2rem;
            text-align: center;
            margin: 20px 0;
            color: #333;
            font-family: 'KBO_Dia', sans-serif;
        }

        @media (max-width: 600px) { 
            .input-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header></header>
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" id="overlay"></div>

    <div class="container">
        
        <div class="section-card">
            <h3>내가 바로 승리요정? 🧚‍♂️</h3>
            <p class="content-text">
                팀의 전체 시즌 성적과 나의 직관 성적을 비교합니다.<br>
                **카이제곱 적합도 검정(조정 승률 모델)** 을 통해 나의 직관 결과가 팀의 평균적인 실력에 비해 얼마나 통계적으로 운이 좋았는지 계산해 드립니다.<br>
                *(야구와 축구 모두 적용 가능하도록 무승부는 0.5승과 0.5패로 나누어 분석합니다.)*
            </p>
        </div>

        <div class="section-card">
            <h3>성적 입력하기</h3>
            
            <h4>1. 팀 전체 성적 (시즌 총 성적)</h4>
            <div class="input-grid">
                <div class="input-group">
                    <label>승 (W)</label>
                    <input type="number" id="team_w" min="0" placeholder="예: 40">
                </div>
                <div class="input-group">
                    <label>무 (D)</label>
                    <input type="number" id="team_d" min="0" placeholder="예: 15">
                </div>
                <div class="input-group">
                    <label>패 (L)</label>
                    <input type="number" id="team_l" min="0" placeholder="예: 30">
                </div>
            </div>

            <h4>2. 나의 직관 성적</h4>
            <div class="input-grid">
                <div class="input-group">
                    <label>승 (W)</label>
                    <input type="number" id="att_w" min="0" placeholder="예: 10">
                </div>
                <div class="input-group">
                    <label>무 (D)</label>
                    <input type="number" id="att_d" min="0" placeholder="예: 2">
                </div>
                <div class="input-group">
                    <label>패 (L)</label>
                    <input type="number" id="att_l" min="0" placeholder="예: 1">
                </div>
            </div>

            <button class="calc-btn" onclick="calculateFairy()">나의 승리요정 지수 확인하기</button>
        </div>

        <div class="section-card" id="result-card">
            <h3>분석 결과 📊</h3>
            <div class="result-highlight" id="result-title"></div>
            <p class="content-text" id="result-desc" style="text-align: center; font-size: 1.1rem; font-weight: bold;"></p>
        </div>

    </div>

    <footer></footer>

    <script>
        document.write('<script src="menu.js?v=' + new Date().getTime() + '"><\/script>');
    </script>
    <script>
        if (typeof loadSidebar === "function") {
            loadSidebar('fairy_test');
        }

        // 정규분포 누적확률함수(CDF) 근사 알고리즘 (자유도 1 카이제곱 p-value 도출용)
        function normCDF(x) {
            const b1 = 0.319381530, b2 = -0.356563782, b3 = 1.781477937, b4 = -1.821255978, b5 = 1.330274429;
            const p = 0.2316419, c = 0.39894228;
            if (x >= 0.0) {
                let t = 1.0 / (1.0 + p * x);
                return (1.0 - c * Math.exp(-x * x / 2.0) * t * (t * (t * (t * (t * b5 + b4) + b3) + b2) + b1));
            } else {
                let t = 1.0 / (1.0 - p * x);
                return (c * Math.exp(-x * x / 2.0) * t * (t * (t * (t * (t * b5 + b4) + b3) + b2) + b1));
            }
        }

        function calculateFairy() {
            // 1. 입력값 가져오기 (빈칸은 0 처리)
            const tw = parseInt(document.getElementById('team_w').value) || 0;
            const td = parseInt(document.getElementById('team_d').value) || 0;
            const tl = parseInt(document.getElementById('team_l').value) || 0;

            const aw = parseInt(document.getElementById('att_w').value) || 0;
            const ad = parseInt(document.getElementById('att_d').value) || 0;
            const al = parseInt(document.getElementById('att_l').value) || 0;

            const teamTotal = tw + td + tl;
            const attTotal = aw + ad + al;

            // 예외 처리
            if(teamTotal === 0 || attTotal === 0) {
                alert("팀 전체 성적과 직관 성적을 1경기 이상 입력해주세요.");
                return;
            }
            if(aw > tw || ad > td || al > tl) {
                alert("입력 오류: 직관한 승/무/패 횟수가 팀 전체의 승/무/패 횟수보다 클 수 없습니다.");
                return;
            }

            // 2. 무승부 분배 (조정 승/패 계산)
            const teamAdjW = tw + (td * 0.5);
            const teamAdjL = tl + (td * 0.5);
            
            const attAdjW = aw + (ad * 0.5);
            const attAdjL = al + (ad * 0.5);

            // 3. 기대값 계산
            const winProb = teamAdjW / teamTotal;
            const lossProb = teamAdjL / teamTotal;

            let expW = attTotal * winProb;
            let expL = attTotal * lossProb;

            // 분모 0 방지
            if (expW === 0) expW = 0.0001;
            if (expL === 0) expL = 0.0001;

            // 4. 카이제곱 통계량 (자유도 df=1)
            const chiSq = Math.pow(attAdjW - expW, 2) / expW + Math.pow(attAdjL - expL, 2) / expL;

            // 5. p-value 계산 (자유도 1인 카이제곱은 표준정규분포 Z^2 와 같음)
            const z = Math.sqrt(chiSq);
            const pValue = 2 * (1 - normCDF(z));

            // 6. 요정 판별 및 백분율
            const isVictoryFairy = attAdjW >= expW;
            let percentile = (pValue / 2) * 100;
            if(percentile < 0.01) percentile = 0.01; 
            
            const displayPercent = percentile.toFixed(2);

            // 7. 결과 출력
            const resultCard = document.getElementById('result-card');
            const resultTitle = document.getElementById('result-title');
            const resultDesc = document.getElementById('result-desc');

            resultCard.style.display = 'block';

            if (isVictoryFairy) {
                resultCard.style.borderColor = '#990000';
                resultTitle.innerHTML = `당신은 상위 <span style="color: #990000;">${displayPercent}%</span> 승리요정! 🧚‍♂️`;
                resultDesc.innerHTML = "팀의 평균 승률을 훌쩍 뛰어넘는 행운의 아이콘이네요!";
            } else {
                resultCard.style.borderColor = '#003399';
                resultTitle.innerHTML = `당신은 상위 <span style="color: #003399;">${displayPercent}%</span> 패배요정... 🌧️`;
                resultDesc.innerHTML = "조금 슬프지만... 팀의 평균보다 직관 승률이 낮습니다. 다음엔 꼭 이길 거예요!";
            }

            resultCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
