<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINS - 승리요정 테스트</title>
    <style>
        /* ============================ */
        /* [1] 폰트 및 공통 스타일        */
        /* ============================ */
        @font-face { font-family: 'KBO_Dia'; src: url('KBO_medium.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'SCDream'; src: url('SCDream5.otf'); font-weight: normal; font-style: normal; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SCDream', sans-serif; line-height: 1.6; background-color: #f9f9f9; }
        h1, h2, h3 { font-family: 'KBO_Dia', sans-serif; }

        /* ============================ */
        /* [2] 메인 컨텐츠 세부 스타일    */
        /* ============================ */
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .section-card {
            background: white; border-radius: 12px; padding: 2rem; margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            transition: all 0.3s ease;
        }
        .section-card h3 { font-size: 1.5rem; margin-bottom: 1rem; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .section-card h4 { color: #333; font-size: 1.1rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        
        .content-text { color: #555; font-size: 0.95rem; margin-bottom: 15px; line-height: 1.7; }

        /* ============================ */
        /* [3] 입력 폼 스타일            */
        /* ============================ */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .input-group input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-family: 'SCDream', sans-serif;
            text-align: center;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #990000;
            box-shadow: 0 0 0 2px rgba(153, 0, 0, 0.1);
        }

        /* 버튼 스타일 */
        .calc-btn {
            display: block;
            width: 100%;
            background-color: #990000;
            color: white;
            text-align: center;
            padding: 15px 0;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-family: 'SCDream', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .calc-btn:hover {
            background-color: #6b0d0d;
        }

        /* ============================ */
        /* [4] 결과 출력 영역 스타일      */
        /* ============================ */
        #result-card {
            display: none; /* 초기에는 숨김 */
            background: #fffafa;
            border: 2px solid #990000;
        }
        
        .result-highlight {
            font-size: 2rem;
            text-align: center;
            margin: 20px 0;
            color: #333;
            font-family: 'KBO_Dia', sans-serif;
        }
        
        .stat-box {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
        }

        @media (max-width: 600px) { 
            .input-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header></header>
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" id="overlay"></div>

    <div class="container">
        
        <div class="section-card">
            <h3>내가 바로 승리요정? 🧚‍♂️</h3>
            <p class="content-text">
                팀이 전체 시즌 동안 기록한 성적과 내가 직접 경기장에 가서 본 직관 성적을 비교합니다.<br>
                **카이제곱 적합도 검정** 을 통해 나의 직관 결과가 팀의 평균적인 실력에 비해 얼마나 통계적으로 '유의미하게' 운이 좋았는지 계산해 드립니다.
            </p>
        </div>

        <div class="section-card">
            <h3>성적 입력하기</h3>
            
            <h4>1. 팀 전체 성적 (시즌 총 성적)</h4>
            <div class="input-grid">
                <div class="input-group">
                    <label>승 (W)</label>
                    <input type="number" id="team_w" min="0" placeholder="예: 40">
                </div>
                <div class="input-group">
                    <label>무 (D)</label>
                    <input type="number" id="team_d" min="0" placeholder="예: 15">
                </div>
                <div class="input-group">
                    <label>패 (L)</label>
                    <input type="number" id="team_l" min="0" placeholder="예: 30">
                </div>
            </div>

            <h4>2. 나의 직관 성적</h4>
            <div class="input-grid">
                <div class="input-group">
                    <label>승 (W)</label>
                    <input type="number" id="att_w" min="0" placeholder="예: 10">
                </div>
                <div class="input-group">
                    <label>무 (D)</label>
                    <input type="number" id="att_d" min="0" placeholder="예: 2">
                </div>
                <div class="input-group">
                    <label>패 (L)</label>
                    <input type="number" id="att_l" min="0" placeholder="예: 1">
                </div>
            </div>

            <button class="calc-btn" onclick="calculateFairy()">나의 승리요정 지수 확인하기</button>
        </div>

        <div class="section-card" id="result-card">
            <h3>분석 결과 📊</h3>
            <div class="result-highlight" id="result-title">
                </div>
            <p class="content-text" id="result-desc" style="text-align: center; font-size: 1.1rem; font-weight: bold;">
                </p>
            
            <div class="stat-box">
                <strong>통계적 분석 상세</strong><br>
                <span id="result-stats"></span>
            </div>
        </div>

    </div>

    <footer></footer>

    <script>
        document.write('<script src="menu.js?v=' + new Date().getTime() + '"><\/script>');
    </script>
    <script>
        if (typeof loadSidebar === "function") {
            loadSidebar('fairy_test');
        }

        // 카이제곱 계산 로직
        function calculateFairy() {
            // 1. 값 가져오기
            const tw = parseInt(document.getElementById('team_w').value) || 0;
            const td = parseInt(document.getElementById('team_d').value) || 0;
            const tl = parseInt(document.getElementById('team_l').value) || 0;

            const aw = parseInt(document.getElementById('att_w').value) || 0;
            const ad = parseInt(document.getElementById('att_d').value) || 0;
            const al = parseInt(document.getElementById('att_l').value) || 0;

            const teamTotal = tw + td + tl;
            const attTotal = aw + ad + al;

            if(teamTotal === 0 || attTotal === 0) {
                alert("팀 전체 성적과 직관 성적을 1경기 이상 올바르게 입력해주세요.");
                return;
            }

            // 2. 기댓값 계산 (Expected)
            const ew = attTotal * (tw / teamTotal);
            const ed = attTotal * (td / teamTotal);
            const el = attTotal * (tl / teamTotal);

            // 분모가 0이 되는 것을 방지 (무승부가 아예 없는 종목 고려)
            const safe_ew = ew === 0 ? 0.0001 : ew;
            const safe_ed = ed === 0 ? 0.0001 : ed;
            const safe_el = el === 0 ? 0.0001 : el;

            // 3. 카이제곱 통계량 (Chi-square statistic)
            const chiSq = Math.pow(aw - safe_ew, 2) / safe_ew + 
                          Math.pow(ad - safe_ed, 2) / safe_ed + 
                          Math.pow(al - safe_el, 2) / safe_el;

            // 4. p-value 계산 (자유도 df=2 인 카이제곱 분포의 CDF 활용)
            // df=2 일 때 p-value 공식은 매우 간단하게 1 - (1 - e^(-x/2)) = e^(-x/2) 로 도출됩니다.
            const pValue = Math.exp(-chiSq / 2);

            // 5. 승리요정/패배요정 판별
            // 승점 기준으로 기댓값보다 높은지 낮은지 판단 (승=3점, 무=1점)
            const actualPoints = (aw * 3) + (ad * 1);
            const expectedPoints = (ew * 3) + (ed * 1);
            
            // 방향성이 있는 검정이므로 양측 검정의 p-value를 반으로 나누어 백분율 계산
            let percentile = (pValue / 2) * 100;
            if(percentile < 0.01) percentile = 0.01; // 최솟값 처리
            
            const isVictoryFairy = actualPoints >= expectedPoints;
            const displayPercent = percentile.toFixed(2);

            // 6. 결과 출력
            const resultCard = document.getElementById('result-card');
            const resultTitle = document.getElementById('result-title');
            const resultDesc = document.getElementById('result-desc');
            const resultStats = document.getElementById('result-stats');

            resultCard.style.display = 'block';

            if (isVictoryFairy) {
                resultCard.style.borderColor = '#990000';
                resultTitle.innerHTML = `당신은 상위 <span style="color: #990000;">${displayPercent}%</span> 승리요정! 🧚‍♂️`;
                resultDesc.innerHTML = "팀의 평균 승률을 훌쩍 뛰어넘는 행운의 아이콘이네요!";
            } else {
                resultCard.style.borderColor = '#003399';
                resultTitle.innerHTML = `당신은 상위 <span style="color: #003399;">${displayPercent}%</span> 패배요정... 🌧️`;
                resultDesc.innerHTML = "조금 슬프지만... 팀의 평균보다 직관 승률이 낮습니다. 다음엔 꼭 이길 거예요!";
            }

            resultStats.innerHTML = `
                • 직관 횟수: ${attTotal}전 ${aw}승 ${ad}무 ${al}패<br>
                • 통계적 기대 승수: ${ew.toFixed(1)}승 ${ed.toFixed(1)}무 ${el.toFixed(1)}패<br>
                • 카이제곱 통계량(χ²): ${chiSq.toFixed(3)}<br>
                • 유의확률(p-value): ${pValue.toFixed(4)}
            `;

            // 스크롤을 결과창으로 부드럽게 이동
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
